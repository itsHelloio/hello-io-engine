name: HelloIo
options:
  bundleIdPrefix: ai.hello-io
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  HelloIoKit:
    path: ../shared/HelloIoKit
  Swabble:
    path: ../../Swabble

schemes:
  HelloIo:
    shared: true
    build:
      targets:
        HelloIo: all
    test:
      targets:
        - HelloIoTests
        - HelloIoLogicTests
  HelloIoLogicTests:
    shared: true
    build:
      targets:
        HelloIoLogicTests: all
    test:
      targets:
        - HelloIoLogicTests

targets:
  HelloIo:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: HelloIoShareExtension
        embed: true
      - target: HelloIoActivityWidget
        embed: true
      - target: HelloIoWatchApp
      - package: HelloIoKit
      - package: HelloIoKit
        product: HelloIoChatUI
      - package: HelloIoKit
        product: HelloIoProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/HelloIo.entitlements
        CODE_SIGN_STYLE: "$(HELLO_IO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(HELLO_IO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(HELLO_IO_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(HELLO_IO_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: HelloIo
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.hello-io.ios
            CFBundleURLSchemes:
              - hello-io
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.hello-io.ios.bgrefresh
        NSLocalNetworkUsageDescription: HelloIo discovers and connects to your HelloIo gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _hello-io-gw._tcp
        NSCameraUsageDescription: HelloIo can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: HelloIo uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: HelloIo can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: HelloIo needs microphone access for voice wake.
        NSMotionUsageDescription: HelloIo may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: HelloIo needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: HelloIo uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  HelloIoShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: HelloIoKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(HELLO_IO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(HELLO_IO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(HELLO_IO_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(HELLO_IO_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: HelloIo Share
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  HelloIoActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/HelloIoActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(HELLO_IO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(HELLO_IO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(HELLO_IO_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: HelloIo Activity
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  HelloIoWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: HelloIoWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(HELLO_IO_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: HelloIo
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
        WKCompanionAppBundleIdentifier: "$(HELLO_IO_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  HelloIoWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(HELLO_IO_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: HelloIo
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(HELLO_IO_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  HelloIoTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: HelloIo
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(HELLO_IO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(HELLO_IO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.hello-io.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HelloIo.app/HelloIo"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: HelloIoTests
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"

  HelloIoLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: HelloIoKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(HELLO_IO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(HELLO_IO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.hello-io.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: HelloIoLogicTests
        CFBundleShortVersionString: "2026.3.9"
        CFBundleVersion: "20260308"
