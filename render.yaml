services:
  - type: web
    name: hello-io
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: HELLO_IO_STATE_DIR
        value: /data/.hello-io
      - key: HELLO_IO_WORKSPACE_DIR
        value: /data/workspace
      - key: HELLO_IO_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: hello-io-data
      mountPath: /data
      sizeGB: 1
